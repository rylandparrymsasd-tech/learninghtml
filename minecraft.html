<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Minecraft</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        #crosshair::before { top: 4px; left: 0; width: 10px; height: 2px; }
        #crosshair::after { top: 0; left: 4px; width: 2px; height: 10px; }
    </style>
</head>
<body>

    <div id="crosshair"></div>

    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    <script>
        // 1. Setup Scene, Camera, Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky color
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 10;

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(100, 100, 50);
        scene.add(dirLight);

        // 3. Block Textures
        const loader = new THREE.TextureLoader();
        const dirtTexture = loader.load('https://githubusercontent.com'); // Placeholder for dirt
        
        // 4. World Generation (Flat Grass/Dirt)
        const blockSize = 1;
        const geometry = new THREE.BoxGeometry(blockSize, blockSize, blockSize);
        const material = new THREE.MeshLambertMaterial({ color: 0x557a46 }); // Green grass color

        for (let x = -20; x <= 20; x++) {
            for (let z = -20; z <= 20; z++) {
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(x, 0, z);
                scene.add(mesh);
            }
        }

        // 5. Pointer Lock Controls
        const controls = new THREE.PointerLockControls(camera, document.body);
        scene.add(controls.getObject());

        document.addEventListener('click', () => {
            controls.lock();
        });

        // 6. Movement Keys
        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w') keys.w = true;
            if (e.key === 'a') keys.a = true;
            if (e.key === 's') keys.s = true;
            if (e.key === 'd') keys.d = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'w') keys.w = false;
            if (e.key === 'a') keys.a = false;
            if (e.key === 's') keys.s = false;
            if (e.key === 'd') keys.d = false;
        });

        // 7. Add & Remove Blocks
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        document.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;

            mouse.x = 0; mouse.y = 0; // Center of screen
            raycaster.setFromCamera(mouse, camera);

            // Exclude ground layer if desired, checking for intersected meshes
            const intersects = raycaster.intersectObjects(scene.children);

            if (intersects.length > 0) {
                const intersect = intersects[0];

                if (e.button === 0) { // Left-click: Remove block
                    if (intersect.object !== scene.children[0]) { // Don't delete base/ground
                        scene.remove(intersect.object);
                    }
                } else if (e.button === 2) { // Right-click: Place block
                    const position = intersect.point.clone().add(intersect.face.normal.multiplyScalar(blockSize / 2)).floor().addScalar(0.5);
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.copy(position);
                    scene.add(mesh);
                }
            }
        });

        // Prevent right-click menu
        document.addEventListener('contextmenu', e => e.preventDefault());

        // 8. Game Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const speed = 10.0 * delta;

            if (controls.isLocked) {
                if (keys.w) controls.moveForward(speed);
                if (keys.s) controls.moveForward(-speed);
                if (keys.a) controls.moveRight(-speed);
                if (keys.d) controls.moveRight(speed);
            }

            renderer.render(scene, camera);
        }
        animate();

        // 9. Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
