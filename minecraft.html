<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Web Minecraft Fix</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; user-select: none; background: #000; }
        canvas { display: block; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: white; }
        #crosshair::before { top: 4px; left: 0; width: 10px; height: 2px; }
        #crosshair::after { top: 0; left: 4px; width: 2px; height: 10px; }
        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 5px; pointer-events: none; }
        .slot { width: 55px; height: 55px; margin: 0 5px; border: 3px solid #444; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 11px; text-shadow: 1px 1px 2px black; border-radius: 4px; }
        .slot.active { border-color: #fff; background: rgba(255,255,255,0.3); }
        #instructions { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.75); padding: 12px; border-radius: 5px; font-size: 13px; line-height: 1.5; pointer-events: none; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="instructions"><strong>Controls:</strong><br>• Click to Lock Mouse<br>• WASD / Spacebar = Move / Jump<br>• Clicks = Build / Destroy<br>• 1-4 = Item Switch</div>
    <div id="inventory">
        <div id="slot-1" class="slot active" style="background: #348C31;">Grass<br>[1]</div>
        <div id="slot-2" class="slot" style="background: #8B5A2B;">Dirt<br>[2]</div>
        <div id="slot-3" class="slot" style="background: #707070;">Stone<br>[3]</div>
        <div id="slot-4" class="slot" style="background: rgba(135,206,250,0.5);">Glass<br>[4]</div>
    </div>
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    <script>
        // --- Core Engine Configuration ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 12, 5);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        // --- Lighting & Materials ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(40, 80, 30);
        scene.add(dirLight);
        const blockTypes = { 1: 0x448833, 2: 0x7A4F2A, 3: 0x666666, 4: 0xADD8E6 };
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const materials = {};
        Object.keys(blockTypes).forEach(id => materials[id] = new THREE.MeshLambertMaterial({color: blockTypes[id]}));

        // --- World Generation & Data ---
        let activeBlockType = 1;
        const blocksArray = [], blockGridMap = new Map();
        function createGridKey(x,y,z) { return `${Math.round(x)},${Math.round(y)},${Math.round(z)}`; }
        function spawnInstanceBlock(x, y, z, typeId) {
            const key = createGridKey(x,y,z);
            if (blockGridMap.has(key)) return;
            const mesh = new THREE.Mesh(geometry, materials[typeId]);
            mesh.position.set(x, y, z);
            mesh.userData = { typeId: parseInt(typeId) };
            scene.add(mesh);
            blocksArray.push(mesh);
            blockGridMap.set(key, mesh);
        }

        // Procedural generation fallback
        for (let x = -12; x <= 12; x++) {
            for (let z = -12; z <= 12; z++) {
                const height = Math.floor((Math.sin(x*0.3)+Math.cos(z*0.3))*1.5)+3;
                for (let y = 0; y <= height; y++) spawnInstanceBlock(x,y,z, y === height ? 1 : (y < height-2 ? 3 : 2));
            }
        }

        // --- Controls & Mechanics ---
        const keyState = { w:false, a:false, s:false, d:false, space:false };
        let playerYVelocity = 0, speed = 6.5, gravity = 22.0;
        document.addEventListener('keydown', (e) => {
            if (['w','a','s','d'].includes(e.key.toLowerCase())) keyState[e.key.toLowerCase()] = true;
            if (e.code === 'Space') keyState.space = true;
            if (['1','2','3','4'].includes(e.key)) {
                document.querySelectorAll('.slot').forEach(el => el.classList.remove('active'));
                activeBlockType = parseInt(e.key);
                document.getElementById(`slot-${activeBlockType}`).classList.add('active');
            }
        });
        document.addEventListener('keyup', (e) => {
            if (['w','a','s','d'].includes(e.key.toLowerCase())) keyState[e.key.toLowerCase()] = false;
            if (e.code === 'Space') keyState.space = false;
        });

        // --- Interaction & Loop ---
        const raycaster = new THREE.Raycaster();
        document.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(blocksArray);
            if (intersects.length > 0) {
                if (e.button === 0) { // Destroy
                    const obj = intersects[0].object;
                    scene.remove(obj);
                    blockGridMap.delete(createGridKey(obj.position.x, obj.position.y, obj.position.z));
                    blocksArray.splice(blocksArray.indexOf(obj), 1);
                } else if (e.button === 2) { // Build
                    const pos = intersects[0].object.position.clone().add(intersects[0].face.normal);
                    spawnInstanceBlock(pos.x, pos.y, pos.z, activeBlockType);
                }
            }
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        const clock = new THREE.Clock();
        function loop() {
            requestAnimationFrame(loop);
            const delta = Math.min(clock.getDelta(), 0.1);
            if (controls.isLocked) {
                if (keyState.w) controls.moveForward(speed * delta);
                if (keyState.s) controls.moveForward(-speed * delta);
                if (keyState.a) controls.moveRight(-speed * delta);
                if (keyState.d) controls.moveRight(speed * delta);
                playerYVelocity -= gravity * delta;
                camera.position.y += playerYVelocity * delta;
                if (camera.position.y < -30) camera.position.set(0, 15, 0);
                // Simple collision check
                if (camera.position.y < 5) { playerYVelocity = 0; camera.position.y = 5; }
            }
            renderer.render(scene, camera);
        }
        loop();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
