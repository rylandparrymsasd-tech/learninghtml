<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Web Minecraft</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; user-select: none; }
        canvas { display: block; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        #crosshair::before { top: 4px; left: 0; width: 10px; height: 2px; }
        #crosshair::after { top: 0; left: 4px; width: 2px; height: 10px; }
        
        #inventory {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 5px;
            pointer-events: none;
        }
        .slot {
            width: 50px;
            height: 50px;
            margin: 0 5px;
            border: 3px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 1px 1px 2px black;
        }
        .slot.active { border-color: #fff; background: rgba(255,255,255,0.2); }
        
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="instructions">
        <strong>Controls:</strong><br>
        Click screen to lock mouse & play<br>
        WASD = Move | Space = Jump<br>
        Left Click = Break Block<br>
        Right Click = Place Block<br>
        Keys 1 - 4 = Select Block Type
    </div>

    <div id="inventory">
        <div id="slot-1" class="slot active" style="background-color: #557a46;">Grass (1)</div>
        <div id="slot-2" class="slot" style="background-color: #8B5A2B;">Dirt (2)</div>
        <div id="slot-3" class="slot" style="background-color: #808080;">Stone (3)</div>
        <div id="slot-4" class="slot" style="background-color: #A0C0F0; color: #111;">Glass (4)</div>
    </div>

    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    <script>
        // 1. Core Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(100, 150, 50);
        scene.add(dirLight);

        // 3. Block Types Configuration
        const blockTypes = {
            1: { name: 'grass', color: 0x557a46, opacity: 1, transparent: false },
            2: { name: 'dirt', color: 0x8B5A2B, opacity: 1, transparent: false },
            3: { name: 'stone', color: 0x808080, opacity: 1, transparent: false },
            4: { name: 'glass', color: 0xA0C0F0, opacity: 0.6, transparent: true }
        };
        let activeBlockType = 1;

        // 4. Geometry and Materials Map
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const materials = {};
        Object.keys(blockTypes).forEach(id => {
            materials[id] = new THREE.MeshLambertMaterial({
                color: blockTypes[id].color,
                transparent: blockTypes[id].transparent,
                opacity: blockTypes[id].opacity
            });
        });

        // 5. Physics and Block Grid Tracking
        const blocks = []; 
        const blockMap = new Map(); // Key: "x,y,z", Value: Mesh

        function getBlockKey(x, y, z) { return `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`; }

        function createBlock(x, y, z, typeId) {
            const key = getBlockKey(x, y, z);
            if (blockMap.has(key)) return;

            const mesh = new THREE.Mesh(geometry, materials[typeId]);
            mesh.position.set(x, y, z);
            mesh.userData = { typeId: typeId };
            scene.add(mesh);
            blocks.push(mesh);
            blockMap.set(key, mesh);
        }

        function removeBlock(mesh) {
            const key = getBlockKey(mesh.position.x, mesh.position.y, mesh.position.z);
            scene.remove(mesh);
            blockMap.delete(key);
            const index = blocks.indexOf(mesh);
            if (index > -1) blocks.splice(index, 1);
            saveWorld();
        }

        // 6. World Generation with LocalStorage Saving/Loading
        function loadOrCreateWorld() {
            const savedData = localStorage.getItem('minecraft_js_world');
            if (savedData) {
                const loadedBlocks = JSON.parse(savedData);
                loadedBlocks.forEach(b => createBlock(b.x, b.y, b.z, b.t));
            } else {
                // Procedural generation (Simulated Simple Perlin Noise Hill Terrain)
                for (let x = -15; x <= 15; x++) {
                    for (let z = -15; z <= 15; z++) {
                        const height = Math.floor((Math.sin(x * 0.2) + Math.cos(z * 0.2)) * 2) + 3;
                        for (let y = 0; y <= height; y++) {
                            let type = 2; // Dirt Default
                            if (y === height) type = 1; // Grass Top
                            if (y < height - 2) type = 3; // Stone Deep
                            createBlock(x, y, z, type);
                        }
                    }
                }
                saveWorld();
            }
        }

        function saveWorld() {
            const dataToSave = blocks.map(b => ({
                x: b.position.x,
                y: b.position.y,
                z: b.position.z,
                t: b.userData.typeId
            }));
            localStorage.setItem('minecraft_js_world', JSON.stringify(dataToSave));
        }

        loadOrCreateWorld();

        // 7. Controls & Player Variables
        const controls = new THREE.PointerLockControls(camera, document.body);
        scene.add(controls.getObject());

        document.addEventListener('click', () => { if (!controls.isLocked) controls.lock(); });

        const keys = { w: false, a: false, s: false, d: false, space: false };
        let velocityY = 0;
        const gravity = 25;
        const jumpForce = 8;
        const playerSpeed = 7;
        const playerHeight = 1.6;

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'w') keys.w = true;
            if (e.key.toLowerCase() === 'a') keys.a = true;
            if (e.key.toLowerCase() === 's') keys.s = true;
            if (e.key.toLowerCase() === 'd') keys.d = true;
            if (e.code === 'Space') keys.space = true;

            // Hotbar selection 1-4
            if (['1', '2', '3', '4'].includes(e.key)) {
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                activeBlockType = parseInt(e.key);
                document.getElementById(`slot-${activeBlockType}`).classList.add('active');
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'w') keys.w = false;
            if (e.key.toLowerCase() === 'a') keys.a = false;
            if (e.key.toLowerCase() === 's') keys.s = false;
            if (e.key.toLowerCase() === 'd') keys.d = false;
            if (e.code === 'Space') keys.space = false;
        });

        // 8. Block Interaction (Raycasting Build/Destroy)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // Kept locked at screen center

        document.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocks);

            if (intersects.length > 0) {
                const intersect = intersects[0];

                if (e.button === 0) { // Left-click: Destroy
                    removeBlock(intersect.object);
                } else if (e.button === 2) { // Right-click: Place
                    const normal = intersect.face.normal;
                    const newPos = intersect.object.position.clone().add(normal);
                    
                    // Prevent placing block directly inside your own head/body space
                    const headX = Math.floor(camera.position.x);
                    const headY = Math.floor(camera.position.y);
                    const headZ = Math.floor(camera.position.z);
                    const footY = Math.floor(camera.position.y - playerHeight);

                    if (!((Math.floor(newPos.x) === headX && Math.floor(newPos.z) === headZ) && 
                        (Math.floor(newPos.y) === headY || Math.floor(newPos.y) === footY))) {
