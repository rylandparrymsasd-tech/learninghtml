<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side-View BedWars - Working Platformer</title>
    <style>
        body {
            margin: 0;
            background: #0f172a;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #game-box {
            position: relative;
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        canvas {
            background: #020617;
            display: block;
            border: 2px solid #475569;
        }
    </style>
</head>
<body>

<div id="game-box">
    <canvas id="gameCanvas" width="1000" height="500"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- GAME CONSTANTS ---
    const GRAVITY = 0.4;

    // --- IMMOVABLE SOLID PLATFORMS ---
    const platforms = [
        { x: 30,  y: 350, w: 220, h: 40, color: '#16a34a', name: 'BLUE BASE' },
        { x: 750, y: 350, w: 220, h: 40, color: '#16a34a', name: 'RED BASE' },
        { x: 380, y: 220, w: 240, h: 30, color: '#15803d', name: 'CENTER MID' }
    ];

    let bridges = [];
    let fireballs = [];
    let keys = {};

    // --- PLAYERS CONFIGURATION ---
    let p1 = { id: 1, x: 100, y: 200, w: 20, h: 30, vx: 0, vy: 0, color: '#38bdf8', facing: 1, grounded: false, bedAlive: true, spawnX: 100, spawnY: 200 };
    let p2 = { id: 2, x: 880, y: 200, w: 20, h: 30, vx: 0, vy: 0, color: '#f43f5e', facing: -1, grounded: false, bedAlive: true, spawnX: 880, spawnY: 200 };

    // --- OBJECTIVE BEDS ---
    let beds = {
        blue: { x: 50, y: 320, w: 50, h: 30, active: true, color: '#2563eb' },
        red: { x: 900, y: 320, w: 50, h: 30, active: true, color: '#dc2626' }
    };

    // --- INPUT CONTROLLERS ---
    window.addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        keys[k] = true;

        // Instant Action Triggers
        if (k === 'e') placeBridge(p1);
        if (k === 'q') shootFireball(p1, p1.facing);
        if (k === '1') placeBridge(p2);
        if (k === '0') shootFireball(p2, p2.facing);
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    // --- CORE BLOCK PLACEMENT AND ROCKET ACTIONS ---
    function placeBridge(player) {
        let bx = player.facing === 1 ? player.x + player.w + 10 : player.x - 50;
        let by = player.y + player.h - 10;
        bridges.push({ x: bx, y: by, w: 40, h: 15, color: player.id === 1 ? '#60a5fa' : '#fb7185' });
    }

    function shootFireball(player, dir) {
        fireballs.push({ x: player.x + player.w / 2, y: player.y + 10, vx: dir * 7, r: 8, owner: player.id });
    }

    function triggerVoidRespawn(player) {
        player.x = player.spawnX;
        player.y = player.spawnY;
        player.vx = 0;
        player.vy = 0;

        if (!player.bedAlive) {
            alert(`GAME OVER: Player ${player.id === 1 ? '2 (Red)' : '1 (Blue)'} wins!`);
            beds.blue.active = true; beds.red.active = true;
            p1.bedAlive = true; p2.bedAlive = true;
            bridges = []; fireballs = [];
        }
    }

    // --- ENGINE STEP PIPELINE ---
    function updatePhysics() {
        // Player 1 Engine (WASD)
        p1.vx = 0;
        if (keys['a']) { p1.vx = -4; p1.facing = -1; }
        if (keys['d']) { p1.vx = 4; p1.facing = 1; }
        if (keys['w'] && p1.grounded) { p1.vy = -10; p1.grounded = false; }

        // Player 2 Engine (Arrow Keys)
        p2.vx = 0;
        if (keys['arrowleft']) { p2.vx = -4; p2.facing = -1; }
        if (keys['arrowright']) { p2.vx = 4; p2.facing = 1; }
        if (keys['arrowup'] && p2.grounded) { p2.vy = -10; p2.grounded = false; }

        // Apply constant gravity down
        p1.vy += GRAVITY;
        p2.vy += GRAVITY;

        // Apply velocities to coordinates
        p1.x += p1.vx; p1.y += p1.vy;
        p2.x += p2.vx; p2.y += p2.vy;

        // --- PLATFORM INTERSECTION LOGIC ---
        let allSolidGround = [...platforms, ...bridges];

        [p1, p2].forEach(p => {
            p.grounded = false;
            allSolidGround.forEach(ground => {
                // Check simple horizontal and vertical cross overlap
                if (p.x + p.w > ground.x && p.x < ground.x + ground.w) {
                    if (p.y + p.h >= ground.y && p.y + p.h - p.vy <= ground.y + 10) {
                        p.y = ground.y - p.h;
                        p.vy = 0;
                        p.grounded = true;
                    }
                }
            });
        });

        // Void bottom barrier fall check
        if (p1.y > canvas.height) triggerVoidRespawn(p1);
        if (p2.y > canvas.height) triggerVoidRespawn(p2);

        // Fireball movements & particle impacts
        fireballs = fireballs.filter(fb => {
            fb.x += fb.vx;
            let target = fb.owner === 1 ? p2 : p1;
            let d = Math.hypot((target.x + target.w/2) - fb.x, (target.y + target.h/2) - fb.y);

            if (d < target.w + fb.r) {
                target.vx += fb.vx * 3;
                target.vy = -6; // Pop opponent up into the sky void
                bridges = bridges.filter(b => Math.hypot((b.x + 20) - fb.x, (b.y + 7) - fb.y) > 60);
                return false;
            }
            return fb.x > 0 && fb.x < canvas.width;
        });

        // Basic Sword Melee Push
        if (p1.x + p1.w > p2.x && p1.x < p2.x + p2.w && p1.y + p1.h > p2.y && p1.y < p2.y + p2.h) {
            let side = p1.x < p2.x ? 1 : -1;
            p2.vx = side * 15; p2.vy = -3;
            p1.vx = -side * 15; p1.vy = -3;
            p1.x += p1.vx; p2.x += p2.vx;
        }

        // Bed Breaker Structural Checks
        if (beds.blue.active && p2.x + p2.w > beds.blue.x && p2.x < beds.blue.x + beds.blue.w && p2.y + p2.h > beds.blue.y && p2.y < beds.blue.y + beds.blue.h) {
            beds.blue.active = false; p1.bedAlive = false;
        }
        if (beds.red.active && p1.x + p1.w > beds.red.x && p1.x < beds.red.x + beds.red.w && p1.y + p1.h > beds.red.y && p1.y < beds.red.y + beds.red.h) {
            beds.red.active = false; p2.bedAlive = false;
        }
    }

    // --- ENGINE GRAPHICS VISIBILITY ---
    function renderGame() {
        ctx.fillStyle = '#020617';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw solid green islands
        platforms.forEach(plat => {
            ctx.fillStyle = plat.color;
            ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 2;
            ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);

            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText(plat.name, plat.x + 15, plat.y + 22);
        });

        // Draw player built bridge sections
        bridges.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.strokeStyle = '#ffffff';
            ctx.strokeRect(b.x, b.y, b.w, b.h);
        });

        // Draw Team Objective Beds
        if (beds.blue.active) {
            ctx.fillStyle = beds.blue.color; ctx.fillRect(beds.blue.x, beds.blue.y, beds.blue.w, beds.blue.h);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.fillText("BLUE BED", beds.blue.x - 2, beds.blue.y - 6);
        }
        if (beds.red.active) {
            ctx.fillStyle = beds.red.color; ctx.fillRect(beds.red.x, beds.red.y, beds.red.w, beds.red.h);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.fillText("RED BED", beds.red.x - 2, beds.red.y - 6);
        }

        // Draw flying fireballs
        fireballs.forEach(fb => {
            ctx.fillStyle = '#ea580c';
            ctx.beginPath(); ctx.arc(fb.x, fb.y, fb.r, 0, Math.PI * 2); ctx.fill();
        });

        // Draw Player 1
        ctx.fillStyle = p1.color; ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
        // Facing Indicator Eye
        ctx.fillStyle = '#fff'; ctx.fillRect(p1.facing === 1 ? p1.x + p1.w - 5 : p1.x + 2, p1.y + 5, 4, 4);

        // Draw Player 2
        ctx.fillStyle = p2.color; ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
        ctx.fillStyle = '#fff'; ctx.fillRect(p2.facing === 1 ? p2.x + p2.w - 5 : p2.x + 2, p2.y + 5, 4, 4);

        // Interface Instruction Strings
        ctx.fillStyle = '#fff'; ctx.font = '13px sans-serif';
        ctx.fillText(`P1 Bed: ${p1.bedAlive ? "OK" : "BROKEN"} | Move: [A,D] • Jump: [W] • Bridge: [E] • Fireball: [Q]`, 20, 30);
        ctx.fillText(`P2 Bed: ${p2.bedAlive ? "OK" : "BROKEN"} | Move: [←,→] • Jump: [↑] • Bridge: [1] • Fireball: [0]`, 500, 30);
    }

    function gameLoop() {
        updatePhysics();
        renderGame();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>

</body>
</html>
