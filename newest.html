<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 B&W Snake · embed for Google Sites</title>
  <style>
    /* Extremely simple, black & white, no distractions */
    * {
      box-sizing: border-box;
      margin: 0;
      user-select: none;
    }
    body {
      background: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      font-family: system-ui, 'Segoe UI', monospace;
    }
    .game-wrapper {
      background: white;
      padding: 16px 16px 20px;
      border: 2px solid #111;
      box-shadow: 8px 8px 0 #111;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      display: block;
      width: 400px;
      height: 400px;
      background: white;
      border: 2px solid black;
      image-rendering: crisp-edges;   /* keep pixels sharp */
      image-rendering: pixelated;
    }
    .status-bar {
      width: 100%;
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: black;
      border-top: 2px solid #222;
      padding-top: 10px;
    }
    .score {
      background: white;
      padding: 0 8px;
    }
    .controls {
      display: flex;
      gap: 12px;
    }
    button {
      background: white;
      border: 2px solid black;
      color: black;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 4px 18px;
      cursor: pointer;
      box-shadow: 3px 3px 0 black;
      transition: 0.05s linear;
      text-transform: uppercase;
      font-family: inherit;
    }
    button:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 black;
    }
    button:focus-visible {
      outline: 2px solid black;
    }
    .hint {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 8px;
      border-top: 1px solid #aaa;
      padding-top: 8px;
      color: #222;
      letter-spacing: 0.3px;
    }
    @media (max-width: 440px) {
      canvas {
        width: 90vw;
        height: 90vw;
        max-width: 400px;
        max-height: 400px;
      }
      .status-bar {
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <div class="status-bar">
    <span class="score">🍎 <span id="scoreDisplay">0</span></span>
    <div class="controls">
      <button id="restartBtn">↺</button>
    </div>
  </div>
  <div class="hint">⬆ ⬇ ⬅ ➡ &nbsp;&nbsp;·&nbsp;&nbsp; space to restart</div>
</div>

<script>
  (function() {
    // ---------- BLACK & WHITE SNAKE ----------
    // grid: 20x20, cell size = 20px
    const GRID_SIZE = 20;          // 20x20 cells
    const CELL_SIZE = 20;          // 400/20
    const TICK_INTERVAL_MS = 180;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');

    // Game state
    let snake = [];               // array of {x, y} from head to tail
    let food = { x: 8, y: 10 };
    let direction = 'right';      // current moving direction
    let nextDirection = 'right';
    let score = 0;
    let gameOver = false;
    let winFlag = false;          // true when snake fills the grid
    let gameInterval = null;

    // ----- helper functions -----
    function randomInt(max) {
      return Math.floor(Math.random() * max);
    }

    // generate new food at empty cell (returns true if placed)
    function generateFood() {
      const totalCells = GRID_SIZE * GRID_SIZE;
      if (snake.length >= totalCells) {
        // win condition: no empty cells
        winFlag = true;
        gameOver = true;
        clearInterval(gameInterval);
        gameInterval = null;
        return false;
      }

      // build a set of occupied positions (fast lookup)
      const occupied = new Set(snake.map(cell => `${cell.x},${cell.y}`));
      if (occupied.size === totalCells) {
        winFlag = true;
        gameOver = true;
        clearInterval(gameInterval);
        gameInterval = null;
        return false;
      }

      // collect free cells
      const free = [];
      for (let i = 0; i < GRID_SIZE; i++) {
        for (let j = 0; j < GRID_SIZE; j++) {
          if (!occupied.has(`${i},${j}`)) {
            free.push({ x: i, y: j });
          }
        }
      }
      if (free.length === 0) {
        winFlag = true;
        gameOver = true;
        clearInterval(gameInterval);
        gameInterval = null;
        return false;
      }

      const randIndex = randomInt(free.length);
      const newFood = free[randIndex];
      food = { x: newFood.x, y: newFood.y };
      return true;
    }

    // reset game to initial state
    function resetGame() {
      // kill any running interval
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }

      // initial snake: length 3, horizontal
      snake = [
        { x: 9, y: 10 },   // head
        { x: 8, y: 10 },
        { x: 7, y: 10 }
      ];
      direction = 'right';
      nextDirection = 'right';
      score = 0;
      gameOver = false;
      winFlag = false;
      scoreSpan.textContent = '0';

      // place food (avoid snake)
      const occupied = new Set(snake.map(c => `${c.x},${c.y}`));
      let placed = false;
      for (let attempt = 0; attempt < 100; attempt++) {
        const fx = randomInt(GRID_SIZE);
        const fy = randomInt(GRID_SIZE);
        if (!occupied.has(`${fx},${fy}`)) {
          food = { x: fx, y: fy };
          placed = true;
          break;
        }
      }
      if (!placed) {
        // fallback: scan all cells (almost never needed)
        for (let i = 0; i < GRID_SIZE; i++) {
          let found = false;
          for (let j = 0; j < GRID_SIZE; j++) {
            if (!occupied.has(`${i},${j}`)) {
              food = { x: i, y: j };
              found = true;
              break;
            }
          }
          if (found) break;
        }
      }

      draw();
      startGameLoop();
    }

    // start the interval (if not already running)
    function startGameLoop() {
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(() => {
        if (!gameOver) {
          moveSnake();
          draw();
        }
      }, TICK_INTERVAL_MS);
    }

    // ----- core movement -----
    function moveSnake() {
      if (gameOver) return;

      // apply the queued direction
      direction = nextDirection;

      // calculate new head position
      const head = snake[0];
      let newHead = { ...head };
      switch (direction) {
        case 'right': newHead.x++; break;
        case 'left':  newHead.x--; break;
        case 'up':    newHead.y--; break;
        case 'down':  newHead.y++; break;
        default: return;
      }

      // check boundaries
      if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
        gameOver = true;
        clearInterval(gameInterval);
        gameInterval = null;
        draw();
        return;
      }

      // check if food eaten
      const isEating = (newHead.x === food.x && newHead.y === food.y);

      // build new snake array (copy)
      let newSnake = [newHead, ...snake];

      if (!isEating) {
        // remove tail
        newSnake.pop();
      }

      // collision check (head collides with body?)
      const headStr = `${newHead.x},${newHead.y}`;
      // we skip the first element (head) when checking
      const bodyWithoutHead = newSnake.slice(1);
      const collision = bodyWithoutHead.some(cell => cell.x === newHead.x && cell.y === newHead.y);

      if (collision) {
        gameOver = true;
        clearInterval(gameInterval);
        gameInterval = null;
        snake = newSnake; // keep state for drawing
        draw();
        return;
      }

      // apply new snake
      snake = newSnake;

      // handle food consumption
      if (isEating) {
        score++;
        scoreSpan.textContent = score;
        const success = generateFood();   // also checks win condition
        if (!success) {
          // if generateFood sets gameOver = true (win or no free cells)
          if (gameOver) {
            clearInterval(gameInterval);
            gameInterval = null;
          }
        }
      }

      // if gameOver flag set by generateFood (win condition)
      if (gameOver) {
        clearInterval(gameInterval);
        gameInterval = null;
      }

      // draw will be called by interval
    }

    // ----- drawing (strict black & white) -----
    function draw() {
      ctx.clearRect(0, 0, 400, 400);
      // white background (already white, but clear)
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, 400, 400);

      // draw grid lines (very light, subtle)
      ctx.strokeStyle = '#eaeaea';
      ctx.lineWidth = 0.6;
      for (let i = 0; i <= GRID_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, 400);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(400, i * CELL_SIZE);
        ctx.stroke();
      }

      // draw snake (black)
      ctx.fillStyle = 'black';
      snake.forEach((cell, index) => {
        const x = cell.x * CELL_SIZE;
        const y = cell.y * CELL_SIZE;
        // head slightly bigger (optional)
        if (index === 0) {
          ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
          // eyes: white dots for fun (still B&W)
          ctx.fillStyle = 'white';
          ctx.fillRect(x + 4, y + 4, 4, 4);
          ctx.fillRect(x + 12, y + 4, 4, 4);
          ctx.fillStyle = 'black';
        } else {
          ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
        }
      });

      // draw food (black circle / square)
      ctx.fillStyle = 'black';
      const fx = food.x * CELL_SIZE;
      const fy = food.y * CELL_SIZE;
      // draw an apple-like square with a stem (just B&W)
      ctx.fillRect(fx + 2, fy + 2, CELL_SIZE - 4, CELL_SIZE - 4);
      // little stem
      ctx.fillRect(fx + 8, fy - 1, 3, 6);
      // highlight (tiny white dot)
      ctx.fillStyle = 'white';
      ctx.fillRect(fx + 6, fy + 6, 4, 4);
      ctx.fillStyle = 'black';

      // if game over overlay
      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0, 0, 400, 400);
        ctx.fillStyle = 'black';
        ctx.font = 'bold 26px system-ui, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        let msg = winFlag ? '✨ YOU WIN!' : '💀 GAME OVER';
        ctx.fillStyle = 'black';
        ctx.fillRect(80, 170, 240, 60);
        ctx.fillStyle = 'white';
        ctx.fillRect(82, 172, 236, 56);
        ctx.fillStyle = 'black';
        ctx.font = 'bold 24px system-ui, monospace';
        ctx.fillText(msg, 200, 200);
        // tiny restart hint
        ctx.font = '14px monospace';
        ctx.fillStyle = '#222';
        ctx.fillText('press SPACE or click ↺', 200, 250);
      }
    }

    // ----- keyboard controls -----
    function handleKeydown(e) {
      const key = e.key;
      // prevent page scrolling with arrows / space
      if (key.startsWith('Arrow') || key === ' ' || key === 'Spacebar') {
        e.preventDefault();
      }

      // restart: space or 'r'
      if (key === ' ' || key === 'Spacebar' || key === 'Space' || key === 'r' || key === 'R') {
        resetGame();
        return;
      }

      if (gameOver) return;

      // direction change (avoid reversing)
      const opposite = {
        'ArrowUp': 'down',
        'ArrowDown': 'up',
        'ArrowLeft': 'right',
        'ArrowRight': 'left'
      };
      if (key in opposite) {
        const newDir = opposite[key];
        // don't allow 180° turn
        if (direction !== newDir) {
          nextDirection = {
            'ArrowUp': 'up',
            'ArrowDown': 'down',
            'ArrowLeft': 'left',
            'ArrowRight': 'right'
          }[key];
        }
      }
    }

    // restart button
    document.getElementById('restartBtn').addEventListener('click', resetGame);

    // window event
    window.addEventListener('keydown', handleKeydown);

    // ensure canvas focus (for key events) – not necessary but safe
    canvas.setAttribute('tabindex', '0');
    canvas.addEventListener('click', () => canvas.focus());

    // start game!
    resetGame();
  })();
</script>
</body>
</html>
